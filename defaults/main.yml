---
virtualbox_version: "7.2.8"
virtualbox_install_method: "dynamic"
virtualbox_force_install: false
virtualbox_check_virtualization: true

virtualbox_users:
  - "{{ ansible_user }}"

virtualbox_download_url: "https://download.virtualbox.org/virtualbox/{{ virtualbox_version }}/{{ virtualbox_package_name }}"
virtualbox_download_dir: "/tmp"

virtualbox_reporitory_distribution: "{{ 'bookworm' if ansible_distribution_release in ['kali-rolling'] else ansible_distribution_release }}"
virtualbox_repository_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'armhf' if ansible_architecture == 'armv7l' else 'amd64' }}"
virtualbox_repository_gpg_key: "https://www.virtualbox.org/download/oracle_vbox_2016.asc"
virtualbox_repository_gpg_key_checksum: "sha256:49e6801d45f6536232c11be6cdb43fa8e0198538d29d1075a7e10165e1fbafe2"
virtualbox_repository_url: "deb [arch={{ virtualbox_repository_arch }} signed-by=/etc/apt/keyrings/virtualbox.asc] https://download.virtualbox.org/virtualbox/debian {{ virtualbox_reporitory_distribution }} contrib"
virtualbox_repository_allow_key_error: false
virtualbox_repository_filename: "virtualbox"
