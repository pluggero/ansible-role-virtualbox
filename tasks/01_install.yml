---
- name: Install virtualbox
  block:
    - name: Check virtualization compatibility
      ansible.builtin.include_tasks: noauto_check_compatibility.yml
      when: virtualbox_check_virtualization | default(true)

    - name: Include OS-specific variables
      ansible.builtin.include_vars: "{{ var_file }}"
      with_first_found:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
        - "{{ ansible_lsb.id }}.yml"
      loop_control:
        loop_var: var_file

    - name: Install OS-specific dependencies
      ansible.builtin.include_tasks: "{{ task_file }}"
      with_first_found:
        - "noauto_install_dep_{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "noauto_install_dep_{{ ansible_os_family }}-{{ ansible_distribution_major_version }}.yml"
        - "noauto_install_dep_{{ ansible_distribution }}.yml"
        - "noauto_install_dep_{{ ansible_os_family }}.yml"
        - "noauto_install_dep_{{ ansible_lsb.id }}.yml"
      loop_control:
        loop_var: task_file

    - name: Get VirtualBox build number
      ansible.builtin.include_tasks: noauto_get_build_number.yml

    - name: Install virtualbox
      ansible.builtin.include_tasks:
        file: noauto_install_{{ virtualbox_install_method }}.yml
