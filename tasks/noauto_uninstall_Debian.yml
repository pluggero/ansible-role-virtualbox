---
- name: Ensure we are using apt
  ansible.builtin.fail:
    msg: "This role only supports {{ ansible_os_family }} systems that use apt as a package manager."
  when: ansible_pkg_mgr != "apt"

- name: Uninstall virtualbox in apt
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      become: true

    - name: Remove virtualbox if it is installed
      ansible.builtin.apt:
        name: "virtualbox-{{ virtualbox_installed_version | regex_replace('\\.\\d+$', '') }}"
        state: absent
      become: true
