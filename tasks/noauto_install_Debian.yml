---
- name: Ensure we are using apt
  ansible.builtin.fail:
    msg: "This role only supports {{ ansible_os_family }} systems that use apt as a package manager."
  when: ansible_pkg_mgr != "apt"

- name: Check if VirtualBox is already installed
  ansible.builtin.command: virtualbox --help
  register: virtualbox_check
  failed_when: false
  changed_when: false

- name: Install VirtualBox via apt
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      become: true

    - name: Ensure virtualbox is installed
      ansible.builtin.apt:
        name: "{{ package }}"
        state: present
      loop: "{{ virtualbox_distro_pkgs }}"
      loop_control:
        loop_var: package
      become: true
